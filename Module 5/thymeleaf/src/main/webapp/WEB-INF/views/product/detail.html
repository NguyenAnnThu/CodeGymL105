<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        form{
            margin:20px 5px 15px 5px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <th:block th:insert="~{layout/layout::library}"/>
</head>
<body>
<th:block th:replace="~{layout/layout::my-navbar}"></th:block>
<div class="container mt-4">
    <div class="row">

        <!-- lệch trái md-2 -->
        <div class="col-md-2"></div>

        <!-- nội dung -->
        <div class="col-md-6">

            <div class="card shadow-sm p-4">
                <h4 class="mb-4">Product Detail</h4>

                <div class="mb-3">
                    <strong>ID:</strong>
                    <span th:text="${product.id}"></span>
                </div>

                <div class="mb-3">
                    <strong>Name:</strong>
                    <span th:text="${product.name}"></span>
                </div>

                <div class="mb-3">
                    <strong>Quantity:</strong>
                    <span th:text="${product.quantity}"></span>
                </div>

                <div class="mb-3">
                    <strong>Type:</strong>
                    <span th:each="t : ${product.type}" th:text="${t} + ' '"></span>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <a th:href="@{/product}" class="btn btn-secondary">Back</a>

                    <a th:href="@{/product/edit/{id}(id=${product.id})}"
                       class="btn btn-primary">
                        Edit
                    </a>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
