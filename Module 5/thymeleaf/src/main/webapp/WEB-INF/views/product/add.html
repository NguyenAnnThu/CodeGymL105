<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        button{
            background-color: white;
        }
        button:hover{
            background-color: cornflowerblue;
        }
    </style>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <th:block th:insert="~{layout/layout::library}"/>
</head>
<body>
<th:block th:replace="~{layout/layout::my-navbar}"></th:block>
<div class="container">
    <div class="row col-md-6">
        <h2>Create a new product</h2>
    </div>
    <div class="row mt-4">
        <form action="/product/add" method="post" th:object="${product}">
            <table class="table table-light">
                <tr>
                    <td>ID</td>
                    <td>
                        <input th:field="*{id}" placeholder="Enter id">
                    </td>
                </tr>

                <tr>
                    <td>Name</td>
                    <td>
                        <input th:field="*{name}" placeholder="Enter name">
                    </td>
                </tr>

                <tr>
                    <td>Quantity</td>
                    <td>
                        <input th:field="*{quantity}" placeholder="Enter quantity">
                    </td>
                </tr>
                <tr>
                    <td>Type of product</td>
                    <td>
                        <select th:field="*{type}">
                            <option th:each="t:${type}"
                                    th:value="${t}"
                                    th:text="${t}">
                            </option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align:center;">
                        <button type="submit">Save</button>
                    </td>
                </tr>
            </table>
        </form>
    </div>
</div>

</body>
</html>
