<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        form{
            margin:20px 5px 15px 5px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <th:block th:insert="~{layout/layout::library}"/>
</head>
<body>
<th:block th:replace="~{layout/layout::my-navbar}"></th:block>
<div class="container">
    <div class="row">

        <div class="col-md-2"></div>

        <div class="col-md-10">

            <div class="card shadow-sm p-4 mt-4">
                <h4 class="mb-4">Update Product</h4>

                <form th:action="@{/product/update}" method="post" th:object="${product}">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Name</label>
                        <input type="text" class="form-control" th:field="*{name}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Quantity</label>
                        <input type="number" class="form-control" th:field="*{quantity}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Type of Product</label>

                        <div class="ms-2 mt-2">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{type}" value="Drink">
                                <label class="form-check-label">Drink</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{type}" value="Food">
                                <label class="form-check-label">Food</label>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{type}" value="Vegetable">
                                <label class="form-check-label">Vegetable</label>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-3 justify-content-center">
                        <button type="submit" class="btn btn-primary px-4">Update</button>
                        <a href="/product" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>

                </form>
            </div>

        </div>

    </div>
</div>
</body>
</html>
