<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <th:block th:insert="~{layout/layout::library}"/>
</head>
<body>
<th:block th:replace="~{layout/layout::my-navbar}"></th:block>
<div class="container">
    <div class="row">
        <div class="col-md-2">
            <h2>Product List</h2>
            <a class="btn btn-sm btn-success" href="/product/add">Create new product </a>
            <div th:if="${mess}" class="alert alert-success">
                <span th:text="${mess}"></span>
            </div>
        </div>

        <div class="row mt-4">
            <table class="table table-light">
                <tr>
                    <th>STT</th>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Quantity</th>
                    <th>Type of Product</th>
                    <th>Action</th>
                </tr>
                <tr th:each="product,status:${productList}">
                    <td th:text="${status.count}"></td>
                    <td th:text="${product.id}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.quantity}"></td>
                    <td>
                        <span th:each="type:${product.type}" th:text="${type}"></span>
                    </td>
                    <td>
                        <a class="btn btn-sm btn-info" th:href="@{/product/view/{id}(id=${product.id})}">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a class="btn btn-sm btn-primary" th:href="@{/product/edit/{id}(id=${product.id})}">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <button class="btn btn-sm btn-danger"
                                data-bs-toggle="modal"
                                data-bs-target="#deleteModal"
                                th:attr="data-id=${product.id}, data-name=${product.name}">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            </table>
            <div class="modal fade" id="deleteModal" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">

                        <div class="modal-header">
                            <h5 class="modal-title">Delete Product</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <div class="modal-body">
                            Are you sure you want to delete <span id="productName"></span>?
                        </div>

                        <div class="modal-footer">
                            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>

                            <a id="confirmDelete" class="btn btn-danger">
                                Delete
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    const deleteModal = document.getElementById('deleteModal');

    deleteModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget; // nút vừa click
        const id = button.getAttribute('data-id');

        const  name=button.getAttribute('data-name');
        const deleteLink = document.getElementById('confirmDelete');
        deleteLink.href = '/product/delete/' + id;
        document.getElementById('productName').innerText=name;
    });
    setTimeout(()=>{
        const  alert= document.querySelector('.alert');
        if(alert){
            alert.style.display='none';
        }
    },3000);
</script>
</body>
</html>
