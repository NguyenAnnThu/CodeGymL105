<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Form đăng ký User</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      background-color: antiquewhite;
    }
  </style>
</head>
<body>
<div class="container mt-5">
  <h2 class="mb-4 text-center">Đăng ký User</h2>
  <div class="row justify-content-center">
    <div class="col-md-6">
      <form th:action="@{/user/submit}" th:object="${user}" method="post" class="needs-validation" novalidate>

        <!-- Firstname -->
        <div class="mb-3">
          <label for="firstName" class="form-label">Firstname</label>
          <input type="text" th:field="*{firstName}" class="form-control" id="firstName" placeholder="Nhập firstname">
          <div class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
        </div>

        <!-- Lastname -->
        <div class="mb-3">
          <label for="lastName" class="form-label">Lastname</label>
          <input type="text" th:field="*{lastName}" class="form-control" id="lastName" placeholder="Nhập lastname">
          <div class="text-danger" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
        </div>

        <!-- Phone -->
        <div class="mb-3">
          <label for="phoneNumber" class="form-label">Phone</label>
          <input type="text" th:field="*{phoneNumber}" class="form-control" id="phoneNumber" placeholder="Nhập số điện thoại">
          <div class="text-danger" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
        </div>

        <!-- Age -->
        <div class="mb-3">
          <label for="age" class="form-label">Age</label>
          <input type="number" th:field="*{age}" class="form-control" id="age" placeholder="Nhập tuổi">
          <div class="text-danger" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></div>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label for="gmail" class="form-label">Email</label>
          <input type="email" th:field="*{gmail}" class="form-control" id="gmail" placeholder="Nhập email">
          <div class="text-danger" th:if="${#fields.hasErrors('gmail')}" th:errors="*{gmail}"></div>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg">Đăng ký</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Bootstrap 5 JS (tùy chọn, cho validation và tương tác) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
