<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách Blog</title>

    <th:block th:replace="layout :: navbar"></th:block>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f6fa;
        }

        .blog-card {
            border-radius: 12px;
            padding: 20px;
        }

        .blog-title {
            font-size: 20px;
            font-weight: 600;
        }

        .blog-content {
            font-size: 15px;
            color: #555;
        }

        .blog-meta {
            font-size: 13px;
            color: #888;
        }

        .btn-action {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container mt-4" style="max-width: 850px">

    <!-- DANH SÁCH BÀI VIẾT -->
    <div th:each="b : ${blogPage.content}" class="card shadow-sm mb-4 blog-card">

        <div>
            <!-- TIÊU ĐỀ -->
            <div class="blog-title" th:text="${b.title}"></div>

            <!-- CATEGORY + AUTHOR (SAFE CHECK) -->
            <div class="blog-meta mt-1">
                <strong>Danh mục:</strong>
                <span th:text="${b.category != null ? b.category.categoryName : 'Không có danh mục'}"></span>
                |
                <strong>Tác giả:</strong>
                <span th:text="${b.author != null ? b.author.name : 'Không có tác giả'}"></span>
            </div>

            <!-- NỘI DUNG RÚT GỌN -->
            <p class="blog-content mt-2"
               th:text="${b.content.length() > 150 ? b.content.substring(0,150) + '...' : b.content}">
            </p>

            <!-- NGÀY TẠO -->
            <div class="blog-meta mt-1">
                <span th:text="${#temporals.format(b.createdAt, 'dd/MM/yyyy')}"></span>
            </div>
        </div>

        <!-- NÚT HÀNH ĐỘNG -->
        <div class="mt-3 d-flex gap-2">
            <a th:href="@{/blog/detail/{id}(id=${b.id})}" class="btn btn-outline-primary btn-action">Xem</a>

            <button
                    class="btn btn-outline-warning btn-action"
                    data-bs-toggle="modal"
                    data-bs-target="#editModal"
                    th:attr="data-id=${b.id},
                             data-title=${b.title},
                             data-content=${b.content},
                             data-author=${b.author != null ? b.author.name : ''},
                             data-category=${b.category != null ? b.category.categoryName : ''},
                             data-created=${b.createdAt}">
                Sửa
            </button>

            <button
                    class="btn btn-outline-danger btn-action"
                    data-bs-toggle="modal"
                    data-bs-target="#confirmDeleteModal"
                    th:attr="data-id=${b.id}">
                Xoá
            </button>
        </div>
    </div>

    <!-- PHÂN TRANG -->
    <nav>
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${blogPage.first} ? 'disabled'">
                <a class="page-link" th:href="@{/blog(page=${blogPage.number - 1}, size=${blogPage.size})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, blogPage.totalPages -1)}"
                th:classappend="${i} == ${blogPage.number} ? 'active'">
                <a class="page-link" th:href="@{/blog(page=${i}, size=${blogPage.size})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${blogPage.last} ? 'disabled'">
                <a class="page-link" th:href="@{/blog(page=${blogPage.number + 1}, size=${blogPage.size})}">Next</a>
            </li>
        </ul>
    </nav>

</div>

<!-- MODAL EDIT -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <form action="/blog/update" method="post">

                <div class="modal-header">
                    <h5 class="modal-title">Chỉnh sửa bài viết</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <!-- ID -->
                    <input type="hidden" name="id" id="edit-id">

                    <!-- TITLE -->
                    <label for="edit-title">Tiêu đề</label>
                    <input type="text" id="edit-title" name="title" class="form-control mb-3" readonly>

                    <!-- CONTENT -->
                    <label for="edit-content">Nội dung</label>
                    <textarea id="edit-content" name="content" class="form-control mb-3" rows="5" required></textarea>

                    <!-- AUTHOR -->
                    <label for="edit-author">Tác giả</label>
                    <select id="edit-author" name="author.id" class="form-control mb-3">
                        <option th:each="a : ${authors}" th:value="${a.id}" th:text="${a.name}" th:selected="${b.author != null} ? ${b.author.id} == ${a.id} : false"></option>
                    </select>

                    <!-- CATEGORY -->
                    <label for="edit-category">Danh mục</label>
                    <select id="edit-category" name="category.id" class="form-control mb-3">
                        <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.categoryName}" th:selected="${b.category != null} ? ${b.category.id} == ${c.id} : false"></option>
                    </select>

                    <!-- CREATED AT -->
                    <label for="edit-createdAt">Ngày tạo</label>
                    <input type="date" id="edit-createdAt" name="createdAt" class="form-control mb-3">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button class="btn btn-primary">Lưu thay đổi</button>
                </div>
            </form>

        </div>
    </div>
</div>

<!-- MODAL DELETE -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title text-danger">Xác nhận xoá</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                Bạn có chắc muốn xoá bài viết này không?
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                <a id="deleteBtn" href="#" class="btn btn-danger">Xoá</a>
            </div>

        </div>
    </div>
</div>

<!-- SCRIPT DELETE -->
<script>
    const deleteModal = document.getElementById('confirmDeleteModal');
    deleteModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const blogId = button.getAttribute('data-id');
        document.getElementById('deleteBtn').href = "/blog/delete/" + blogId;
    });
</script>

<!-- SCRIPT EDIT -->
<script>
    const editModal = document.getElementById('editModal');

    editModal.addEventListener('show.bs.modal', function (event) {
        const btn = event.relatedTarget;

        // Lấy data từ button
        const id = btn.getAttribute('data-id');
        const title = btn.getAttribute('data-title');
        const content = btn.getAttribute('data-content');
        const author = btn.getAttribute('data-author');
        const category = btn.getAttribute('data-category');
        const createdAt = btn.getAttribute('data-created');

        // Gán vào input trong modal
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-title').value = title;
        document.getElementById('edit-content').value = content;

        if (document.getElementById('edit-author'))
            document.getElementById('edit-author').value = author;

        if (document.getElementById('edit-category'))
            document.getElementById('edit-category').value = category;

        if (document.getElementById('edit-createdAt'))
            document.getElementById('edit-createdAt').value = createdAt;
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
