<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết bài viết</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" style="color: black" href="/blog">MyBlog</a>

        <div>
            <a href="/blog" class="btn btn-light btn-sm me-2">Trang chủ</a>

            <a href="/categories" class="btn btn-light btn-sm me-2">Thể loại</a>
            <a href="/authors" class="btn btn-light btn-sm me-2">Tác giả</a>

            <a href="/blog/create" class="btn btn-light btn-sm">Tạo bài viết</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">

            <!-- Tiêu đề -->
            <h2 th:text="${blog.title}"></h2>

            <!-- Category + Author -->
            <p class="text-secondary mt-2">
                <strong>Danh mục:</strong>
                <span th:text="${blog.category.categoryName}"></span>
                |
                <strong>Tác giả:</strong>
                <span th:text="${blog.author.name}"></span>
            </p>

            <!-- Ngày tạo -->
            <p class="text-muted">
                🕒 <span th:text="${blog.createdAt}"></span>
            </p>

            <!-- Nội dung -->
            <p th:text="${blog.content}"
               class="mt-3"
               style="font-size: 18px; line-height: 1.7;">
            </p>

            <!-- Nút quay lại -->
            <a href="/blog" class="btn btn-primary mt-3">← Quay lại</a>
        </div>
    </div>
</div>

</body>
</html>
