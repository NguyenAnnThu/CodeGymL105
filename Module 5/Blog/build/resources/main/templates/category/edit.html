<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa thể loại</title>
    <th:block th:replace="layout :: navbar"></th:block>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">
    <h2 class="mb-3">Sửa Thể loại</h2>

    <form th:action="@{/categories/update}" th:object="${category}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Type Category</label>
            <input class="form-control" th:field="*{typeCategory}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tên thể loại</label>
            <input class="form-control" th:field="*{categoryName}" required>
        </div>

        <button class="btn btn-primary">Cập nhật</button>
        <a href="/categories" class="btn btn-secondary">Quay lại</a>

    </form>

</div>

</body>
</html>
