<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Author List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f6fa;
    }
    .blog-card {
      border-radius: 12px;
      padding: 20px;
    }
  </style>
</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" style="color: black" href="/blog">MyBlog</a>

    <div>
      <a href="/blog" class="btn btn-light btn-sm me-2">Trang chủ</a>

      <a href="/categories" class="btn btn-light btn-sm me-2">Thể loại</a>
      <a href="/authors" class="btn btn-light btn-sm me-2">Tác giả</a>

      <a href="/blog/create" class="btn btn-light btn-sm">Tạo bài viết</a>
    </div>
  </div>
</nav>
<div class="container mt-4">

  <h2 class="mb-3">Author List</h2>
  <form th:action="@{/authors/create}" th:object="${author}" method="post" class="row g-3 mb-4">

    <div class="col-md-4">
      <label class="form-label">Name</label>
      <input type="text" th:field="*{name}" class="form-control" required>
    </div>

    <div class="col-md-2">
      <label class="form-label">Age</label>
      <input type="number" th:field="*{age}" class="form-control" required>
    </div>

    <div class="col-md-3">
      <label class="form-label">Gender</label>
      <select th:field="*{gender}" class="form-select">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>

    <div class="col-md-3 d-flex align-items-end">
      <button class="btn btn-primary w-100">Add Author</button>
    </div>
  </form>

  <table class="table table-bordered table-striped">
    <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Age</th>
      <th>Gender</th>
      <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="a : ${authors}">
      <td th:text="${a.id}"></td>
      <td th:text="${a.name}"></td>
      <td th:text="${a.age}"></td>
      <td th:text="${a.gender}"></td>
      <td>
        <a class="btn btn-warning btn-sm" th:href="@{'/authors/edit/' + ${a.id}}">Edit</a>
        <a class="btn btn-danger btn-sm"
           th:href="@{'/authors/delete/' + ${a.id}}"
           onclick="return confirm('Are you sure?')">
          Delete
        </a>
      </td>
    </tr>
    </tbody>
  </table>
</div>

</body>
</html>
