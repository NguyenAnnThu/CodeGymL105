<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<title>Chi tiết bài viết</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<th:block th:replace="layout :: navbar"></th:block>
</head>

<body class="bg-light">

<div class="container mt-4" >
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 th:text="${blog.title}"></h2>

            <p class="text-muted">🕒 <span th:text="${blog.createdAt}"></span></p>

            <p th:text="${blog.content}" class="mt-3" style="font-size: 18px; line-height: 1.7;"></p>

            <a href="/blog" class="btn btn-primary mt-3">← Quay lại</a>
        </div>
    </div>
</div>

</body>
</html>
