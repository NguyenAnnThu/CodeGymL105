<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa thể loại</title

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" style="color: black" href="/blog">MyBlog</a>

        <div>
            <a href="/blog" class="btn btn-light btn-sm me-2">Trang chủ</a>

            <a href="/categories" class="btn btn-light btn-sm me-2">Thể loại</a>
            <a href="/authors" class="btn btn-light btn-sm me-2">Tác giả</a>

            <a href="/blog/create" class="btn btn-light btn-sm">Tạo bài viết</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <h2 class="mb-3">Sửa Thể loại</h2>

    <form th:action="@{/categories/update}" th:object="${category}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Type Category</label>
            <input class="form-control" th:field="*{typeCategory}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tên thể loại</label>
            <input class="form-control" th:field="*{categoryName}" required>
        </div>

        <button class="btn btn-primary">Cập nhật</button>
        <a href="/categories" class="btn btn-secondary">Quay lại</a>

    </form>

</div>

</body>
</html>
