<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý Thể loại</title>
  <th:block th:replace="layout :: navbar"></th:block>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f5f6fa;
    }

    .blog-card {
      border-radius: 12px;
      padding: 20px;
    }

    .blog-title {
      font-size: 20px;
      font-weight: 600;
    }

    .blog-content {
      font-size: 15px;
      color: #555;
    }

    .blog-meta {
      font-size: 13px;
      color: #888;
    }

    .btn-action {
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="container mt-4">
  <h2 class="mb-4">Danh sách Thể loại</h2>

  <!-- FORM TẠO THỂ LOẠI -->
  <form th:action="@{/categories/create}" method="post" class="mb-4" th:object="${category}">
    <div class="row g-3">

      <div class="col-md-4">
        <label class="form-label">Loại thể loại</label>
        <input class="form-control" th:field="*{typeCategory}" required>
      </div>

      <div class="col-md-4">
        <label class="form-label">Tên thể loại</label>
        <input class="form-control" th:field="*{categoryName}" required>
      </div>

      <div class="col-md-4 d-flex align-items-end">
        <button class="btn btn-primary w-100">Thêm</button>
      </div>

    </div>
  </form>

  <!-- DANH SÁCH -->
  <table class="table table-bordered">
    <thead class="table-light">
    <tr>
      <th>ID</th>
      <th>Type Category</th>
      <th>Tên Thể loại</th>
      <th style="width: 150px;">Hành động</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="c : ${categories}">
      <td th:text="${c.id}"></td>
      <td th:text="${c.typeCategory}"></td>
      <td th:text="${c.categoryName}"></td>
      <td>
        <a th:href="@{/categories/edit/{id}(id=${c.id})}" class="btn btn-warning btn-sm">Sửa</a>
        <a th:href="@{/categories/delete/{id}(id=${c.id})}" class="btn btn-danger btn-sm"
           onclick="return confirm('Bạn chắc muốn xóa?')">Xóa</a>
      </td>
    </tr>
    </tbody>

  </table>

</div>

</body>
</html>
