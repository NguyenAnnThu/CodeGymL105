<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa bài viết</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4" style="max-width: 700px;">
    <div class="card shadow-sm">
        <div class="card-body">

            <h3>Cập nhật bài viết</h3>

            <!-- FORM KHÔNG SUBMIT, CHỈ ĐỂ NHẬP LIỆU -->
            <form id="updateForm" class="mt-3">

                <input type="hidden" id="id" th:value="${blog.id}">

                <label class="form-label">Tiêu đề</label>
                <input type="text" id="title" th:value="${blog.title}" class="form-control mb-3">

                <label class="form-label">Nội dung</label>
                <textarea rows="5" id="content"
                          class="form-control mb-3"
                          th:text="${blog.content}"></textarea>

                <label class="form-label">Tác giả</label>
                <select id="author" class="form-control mb-3"
                        th:each="a : ${authors}">
                    <option th:value="${a.id}"
                            th:selected="${a.id == blog.author.id}"
                            th:text="${a.name}">
                    </option>
                </select>

                <label class="form-label">Danh mục</label>
                <select id="category" class="form-control mb-3"
                        th:each="c : ${categories}">
                    <option th:value="${c.id}"
                            th:selected="${c.id == blog.category.id}"
                            th:text="${c.categoryName}">
                    </option>
                </select>

                <label class="form-label">Ngày tạo</label>
                <input type="date" id="createdAt" class="form-control mb-3"
                       th:value="${blog.createdAt}">

                <button type="button" id="btnUpdate" class="btn btn-primary">Lưu thay đổi</button>

            </form>

        </div>
    </div>
</div>


<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    $("#btnUpdate").click(function () {

        let id = $("#id").val();

        let data = {
            title: $("#title").val(),
            content: $("#content").val(),
            createdAt: $("#createdAt").val(),
            author: { id: $("#author").val() },
            category: { id: $("#category").val() }
        };

        $.ajax({
            url: "/blog/" + id,
            method: "PUT",
            contentType: "application/json",
            data: JSON.stringify(data),
            success: function () {
                alert("Cập nhật thành công!");
                window.location.href = "/blog"; // quay về trang list
            },
            error: function () {
                alert("Lỗi rồi!");
            }
        });
    });
</script>

</body>
</html>
