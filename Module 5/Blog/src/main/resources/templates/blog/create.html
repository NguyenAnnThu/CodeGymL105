<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sửa bài viết</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <th:block th:replace="layout :: navbar"></th:block>
</head>

<body class="bg-light">

<div class="container mt-4" style="max-width: 700px;">
    <div class="card shadow-sm">
        <div class="card-body">

            <h3>Cập nhật bài viết</h3>
            <form action="/blog/update" method="post" class="mt-3">

                <input type="hidden" name="id" th:value="${blog.id}">

                <label class="form-label">Tiêu đề</label>
                <input type="text" name="title" th:value="${blog.title}" class="form-control mb-3">

                <label class="form-label">Nội dung</label>
                <textarea rows="5" name="content" class="form-control mb-3"
                          th:text="${blog.content}"></textarea>

                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
