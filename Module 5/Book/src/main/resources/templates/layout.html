<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Library System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold text-white">📚 Library Management</a>

  <form class="d-flex" th:action="@{/book/search}" method="get">
    <input class="form-control me-2" type="search"
           placeholder="Tìm kiếm sách..." name="keyword">
    <button class="btn btn-outline-light" type="submit">Search</button>
  </form>

  <div>
    <a th:href="@{/book}" class="btn btn-primary me-2">Danh sách sách</a>
    <a th:href="@{/borrow/list}" class="btn btn-secondary">Người mượn</a>
  </div>
</nav>

<div class="d-flex">

  <!-- SIDEBAR -->
  <div class="bg-light border-end" style="width:250px; height:100vh;">
    <div class="list-group list-group-flush p-2">
      <a th:href="@{/book}" class="list-group-item list-group-item-action">📘 Danh sách sách</a>
      <a th:href="@{/borrow/list}" class="list-group-item list-group-item-action">👤 Danh sách người mượn</a>
      <a th:href="@{/book/return}" class="list-group-item list-group-item-action">🔄 Trả sách</a>
    </div>
  </div>

  <div class="p-4 flex-grow-1" th:fragment="content">

    <div th:replace="${content}"></div>
  </div>

</div>

</body>
</html>
