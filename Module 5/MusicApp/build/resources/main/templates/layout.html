<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>Music App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            top: 56px;
            left: 0;
            background: #f8f9fa;
            padding-top: 20px;
            border-right: 1px solid #ddd;
        }
        .content-area {
            margin-left: 220px;
            margin-top: 56px;
            padding: 20px;
            height: calc(100vh - 56px);
            overflow-y: auto;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/songs">Music App</a>
    </div>
</nav>

<div class="sidebar">
    <ul class="nav flex-column px-3">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/songs}">Danh sách bài hát</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:href="@{/songs/create}">Thêm bài hát</a>
        </li>
    </ul>
</div>

<div class="content-area">
    <!-- CHỈNH LẠI Ở ĐÂY -->
    <div th:replace="${content}"></div>
</div>

</body>
</html>
