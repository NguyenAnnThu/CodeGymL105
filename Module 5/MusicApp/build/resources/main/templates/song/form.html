<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::content})">

<th:block th:fragment="content">
    <h2>Thêm bài hát mới</h2>
<form th:action="@{${song.id == null ? '/songs/create' : '/songs/edit'}}"
      th:object="${song}" method="post">

    <!-- Hidden ID để update không bị tạo bản mới -->
    <input type="hidden" th:field="*{id}">

    <div class="mb-3">
        <label class="form-label fw-semibold">Tên bài hát</label>
        <input type="text" class="form-control" th:field="*{title}">
        <p class="text-danger small" th:errors="*{title}"></p>
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold">Nghệ sĩ</label>
        <input type="text" class="form-control" th:field="*{artist}">
        <p class="text-danger small" th:errors="*{artist}"></p>
    </div>

    <div class="mb-3">
        <label class="form-label fw-semibold">Thể loại</label>
        <input type="text" class="form-control" th:field="*{genre}">
        <p class="text-danger small" th:errors="*{genre}"></p>
    </div>

    <div class="d-flex justify-content-end gap-2">
        <a href="/songs" class="btn btn-secondary">Hủy</a>
        <button type="submit" class="btn btn-success">Lưu</button>
    </div>

</form>
